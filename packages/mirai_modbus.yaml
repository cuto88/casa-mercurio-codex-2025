modbus:
  - name: mirai
    type: tcp
    host: !secret mirai_modbus_host
    port: 502
    delay: 2
    timeout: 3
    retries: 2
    message_wait_milliseconds: 30
    retry_on_empty: true
    close_comm_on_error: true

    sensors:
      - name: "mirai_status_word_raw"
        unique_id: mirai_status_word_raw
        address: 1003
        input_type: holding
        data_type: uint16
        scan_interval: 30
        slave: 3

      - name: "mirai_fault_code_raw"
        unique_id: mirai_fault_code_raw
        address: 1209
        input_type: holding
        data_type: uint16
        scan_interval: 30
        slave: 3

      - name: "mirai_status_code_raw"
        unique_id: mirai_status_code_raw
        address: 1208
        input_type: holding
        data_type: uint16
        scan_interval: 30
        slave: 3
