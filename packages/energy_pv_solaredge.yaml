###############################################################################
# PACKAGE: energy_pv_solaredge.yaml
# Modulo Energia – Produzione Fotovoltaico SolarEdge
# Sensori canonici per pannello Energia + plance Casa Mercurio
###############################################################################

####################################
# 1) TEMPLATE SENSOR – POTENZA PV
####################################
template:
  - sensor:
      - name: "PV Potenza Attuale"
        unique_id: pv_power_now
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        availability: >
          {% set se = states('sensor.solaredge_potenza_attuale') %}
          {% set lt = states('sensor.sensor_pv_power_w') %}
          {{ se not in ['unknown','unavailable','none','None',''] or lt not in ['unknown','unavailable','none','None',''] }}
        state: >
          {% set se = states('sensor.solaredge_potenza_attuale') %}
          {% set lt = states('sensor.sensor_pv_power_w') %}
          {% if se not in ['unknown','unavailable','none','None',''] %}
            {{ se | float(0) }}
          {% elif lt not in ['unknown','unavailable','none','None',''] %}
            {{ lt | float(0) }}
          {% else %}
            {{ none }}
          {% endif %}

      - name: "PV Potenza Sorgente"
        unique_id: pv_power_source_selected
        icon: mdi:source-branch
        state: >
          {% set se = states('sensor.solaredge_potenza_attuale') %}
          {% set lt = states('sensor.sensor_pv_power_w') %}
          {% if se not in ['unknown','unavailable','none','None',''] %}
            solaredge
          {% elif lt not in ['unknown','unavailable','none','None',''] %}
            localtuya_fallback
          {% else %}
            unavailable
          {% endif %}

####################################
# 2) TEMPLATE SENSOR – ENERGIA TOTALE PV (kWh)
####################################
  - sensor:
      - name: "PV Energia Totale"
        unique_id: pv_energy_total
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: "kWh"
        availability: >
          {{ states('sensor.solaredge_energia_dall_installazione') not in ['unknown','unavailable','none','None',''] }}
        state: >
          {{ (states('sensor.solaredge_energia_dall_installazione') | float / 1000) | round(3) }}

####################################
# 3) UTILITY METER – PRODUZIONE PV
####################################
utility_meter:
  pv_energy_daily:
    name: PV Energia Giornaliera
    unique_id: pv_energy_daily
    source: sensor.pv_energy_total
    cycle: daily

  pv_energy_monthly:
    name: PV Energia Mensile
    unique_id: pv_energy_monthly
    source: sensor.pv_energy_total
    cycle: monthly

  pv_energy_yearly:
    name: PV Energia Annuale
    unique_id: pv_energy_yearly
    source: sensor.pv_energy_total
    cycle: yearly

###############################################################################
# FINE FILE
###############################################################################
