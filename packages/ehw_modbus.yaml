modbus:
  - name: ehw_modbus
    type: tcp
    host: !secret ehw_modbus_host
    port: !secret ehw_modbus_port
    delay: 1
    timeout: 3
    retries: 1
    message_wait_milliseconds: 30

    sensors:
      - name: "EHW reg56 status"
        unique_id: ehw_reg56_status
        address: 56
        input_type: holding
        data_type: uint16
        scan_interval: 21600
        slave: !secret ehw_modbus_slave

      - name: "EHW reg57 runtime"
        unique_id: ehw_reg57_runtime
        address: 57
        input_type: holding
        data_type: uint16
        scan_interval: 21600
        slave: !secret ehw_modbus_slave

      - name: "EHW reg60 value"
        unique_id: ehw_reg60_value
        address: 60
        input_type: holding
        data_type: uint16
        scan_interval: 21600
        slave: !secret ehw_modbus_slave

      # Vendor parameter registers (read-only diagnostics from EHW manual).
      # Keep low-frequency polling to avoid extra Modbus pressure.
      - name: "EHW reg1082 solar pump delta start"
        unique_id: ehw_reg1082_solar_pump_delta_start
        address: 1082
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      - name: "EHW reg1088 solar drain valve setpoint"
        unique_id: ehw_reg1088_solar_drain_valve_setpoint
        address: 1088
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      - name: "EHW reg1089 solar pump stop setpoint"
        unique_id: ehw_reg1089_solar_pump_stop_setpoint
        address: 1089
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      - name: "EHW reg1106 dhw setpoint delta"
        unique_id: ehw_reg1106_dhw_setpoint_delta
        address: 1106
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      - name: "EHW reg1109 electric heater delay"
        unique_id: ehw_reg1109_electric_heater_delay
        address: 1109
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      - name: "EHW reg1255 modbus address"
        unique_id: ehw_reg1255_modbus_address
        address: 1255
        input_type: holding
        data_type: uint16
        scan_interval: 300
        slave: !secret ehw_modbus_slave

      # T01..T06 RAW (A = doc_reg - 1, B = doc_reg)
      # Keep these as low-frequency diagnostic probes to reduce Modbus churn.
      - name: "EHW T01 raw A"
        unique_id: ehw_t01_raw_a
        address: 2018
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T01 raw B"
        unique_id: ehw_t01_raw_b
        address: 2019
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T02 raw A"
        unique_id: ehw_t02_raw_a
        address: 2019
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T02 raw B"
        unique_id: ehw_t02_raw_b
        address: 2020
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T03 raw A"
        unique_id: ehw_t03_raw_a
        address: 2020
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T03 raw B"
        unique_id: ehw_t03_raw_b
        address: 2021
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T04 raw A"
        unique_id: ehw_t04_raw_a
        address: 2021
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T04 raw B"
        unique_id: ehw_t04_raw_b
        address: 2022
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T05 raw A"
        unique_id: ehw_t05_raw_a
        address: 2022
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T05 raw B"
        unique_id: ehw_t05_raw_b
        address: 2023
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T06 raw A"
        unique_id: ehw_t06_raw_a
        address: 2023
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW T06 raw B"
        unique_id: ehw_t06_raw_b
        address: 2024
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      # Setpoint RAW (1104/1105, A = doc_reg - 1, B = doc_reg)
      - name: "EHW setpoint 1104 raw A"
        unique_id: ehw_setpoint_1104_raw_a
        address: 1103
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW setpoint 1104 raw B"
        unique_id: ehw_setpoint_1104_raw_b
        address: 1104
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW setpoint 1105 raw A"
        unique_id: ehw_setpoint_1105_raw_a
        address: 1104
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

      - name: "EHW setpoint 1105 raw B"
        unique_id: ehw_setpoint_1105_raw_b
        address: 1105
        input_type: holding
        data_type: uint16
        unit_of_measurement: "raw"
        scan_interval: 180
        slave: !secret ehw_modbus_slave

input_select:
  "ehw_address_mode":
    name: EHW address mode
    options:
      - doc_1_based
      - doc_0_based
    initial: doc_1_based

input_boolean:
  "ehw_swap_top_bottom":
    name: EHW swap top/bottom
    icon: mdi:swap-vertical
    initial: false

input_number:
  "ehw_temp_scale":
    name: EHW temp scale
    min: 0.01
    max: 5
    step: 0.01
    mode: slider
    initial: 0.3
  "ehw_temp_offset":
    name: EHW temp offset
    min: -20
    max: 20
    step: 0.1
    mode: slider
    initial: 0.0
  "ehw_setpoint_scale":
    name: EHW setpoint scale
    min: 0.01
    max: 5
    step: 0.01
    mode: slider
    initial: 0.3
  "ehw_setpoint_offset":
    name: EHW setpoint offset
    min: -20
    max: 20
    step: 0.1
    mode: slider
    initial: 0.0

template:
  - sensor:
      - name: "EHW status word hex"
        unique_id: ehw_status_word_hex
        state: >-
          {{ '0x%04X' | format(states('sensor.ehw_reg56_status') | int(0)) }}
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}

      - name: "EHW runtime word hex"
        unique_id: ehw_runtime_word_hex
        state: >-
          {{ '0x%04X' | format(states('sensor.ehw_reg57_runtime') | int(0)) }}
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}

  - binary_sensor:
      - name: "CM Modbus ready"
        unique_id: cm_modbus_ready
        icon: mdi:check-network
        state: >-
          {% if has_value('sensor.ehw_reg56_status') or has_value('sensor.ehw_setpoint_raw_calc') %}
            on
          {% else %}
            off
          {% endif %}
      - name: "CM Modbus EHW ready"
        unique_id: cm_modbus_ehw_ready
        icon: mdi:check-network
        state: >-
          {% if has_value('sensor.ehw_reg56_status') or has_value('sensor.ehw_t02_raw_a') %}
            on
          {% else %}
            off
          {% endif %}

      - name: "EHW status bit 0x0100"
        unique_id: ehw_status_bit_0100
        state: >-
          {{ (states('sensor.ehw_reg56_status') | int(0)) | bitwise_and(256) > 0 }}
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}

      - name: "EHW status bit 0x0200"
        unique_id: ehw_status_bit_0200
        state: >-
          {{ (states('sensor.ehw_reg56_status') | int(0)) | bitwise_and(512) > 0 }}
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}

  - sensor:
      - name: "EHW T01 raw"
        unique_id: ehw_t01_raw
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        unit_of_measurement: "raw"
        state: >-
          {% set v = none %}
          {% if is_state('input_select.ehw_address_mode', 'doc_1_based') %}
            {% set v = states('sensor.ehw_t01_raw_a') | float(default=none) %}
          {% else %}
            {% set v = states('sensor.ehw_t01_raw_b') | float(default=none) %}
          {% endif %}
          {% if v is none %}
            {{ none }}
          {% else %}
            {{ v | round(0) }}
          {% endif %}
      - name: "EHW T02 raw"
        unique_id: ehw_t02_raw
