              {{ none }}
            {% else %}
              {{ val | round(1) }}
            {% endif %}
          {% endif %}
      - name: "EHW delta stratificazione"
        unique_id: ehw_delta_stratificazione
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        unit_of_measurement: "°C"
        state_class: measurement
        state: >-
          {% if is_number(states('sensor.ehw_tank_top')) and is_number(states('sensor.ehw_tank_bottom')) %}
            {{
              (
                (states('sensor.ehw_tank_top') | float(0))
                - (states('sensor.ehw_tank_bottom') | float(0))
              ) | round(1)
            }}
          {% else %}
            {{ none }}
          {% endif %}
      - name: "EHW status"
        unique_id: ehw_status
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        state: >-
          {% if is_state('binary_sensor.ehw_running', 'on') %}
            In funzione
          {% else %}
            Spento
          {% endif %}
      - name: "EHW mapping health"
        unique_id: ehw_mapping_health
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        icon: mdi:stethoscope
        state: >-
          {% set regs_ok = is_number(states('sensor.ehw_reg56_status'))
            or is_number(states('sensor.ehw_reg57_runtime'))
            or is_number(states('sensor.ehw_reg60_value'))
            or is_number(states('sensor.ehw_setpoint_raw_calc')) %}
          {% set t_ok = is_number(states('sensor.ehw_tank_top'))
            and is_number(states('sensor.ehw_tank_bottom'))
            and (states('sensor.ehw_tank_top') | float(0)) >= 0
            and (states('sensor.ehw_tank_top') | float(0)) <= 90
            and (states('sensor.ehw_tank_bottom') | float(0)) >= 0
            and (states('sensor.ehw_tank_bottom') | float(0)) <= 90 %}
          {% if regs_ok or t_ok %}
            ok
          {% else %}
            suspect_all_zero
          {% endif %}
  - binary_sensor:
      - name: "EHW running"
        unique_id: ehw_running
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        state: >-
          {% set has_raw = is_number(states('sensor.ehw_setpoint_raw_calc')) and is_number(states('sensor.ehw_tank_top_raw_calc')) %}
          {% set has_scaled = is_number(states('sensor.ehw_setpoint')) and is_number(states('sensor.ehw_tank_top')) %}
          {% if has_raw and has_scaled %}
            {{ (states('sensor.ehw_setpoint') | float(0)) - (states('sensor.ehw_tank_top') | float(0)) >= 1.0 }}
          {% else %}
            false
          {% endif %}
      - name: "EHW mapping suspect"
        unique_id: ehw_mapping_suspect
        availability: >-
          {{ is_state('binary_sensor.cm_modbus_ehw_ready', 'on') }}
        icon: mdi:alert
        state: >-
          {{ is_state('sensor.ehw_mapping_health', 'suspect_all_zero') }}
