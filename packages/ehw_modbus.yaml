        unit_of_measurement: "raw"
        state: >-
          {% set t02 = states('sensor.ehw_t02_raw') %}
          {% if t02 in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set t02 = states('sensor.ehw_t02_raw_2') %}
          {% endif %}
          {% set t03 = states('sensor.ehw_t03_raw') %}
          {% if t03 in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set t03 = states('sensor.ehw_t03_raw_2') %}
          {% endif %}
          {% set v = (t03 | float(default=none)) if is_state('input_boolean.ehw_swap_top_bottom', 'on') else (t02 | float(default=none)) %}
