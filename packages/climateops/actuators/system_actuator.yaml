---
input_text:
  cm_system_status:
    name: "CM System Status"
    icon: mdi:thermostat-auto

automation:
  - id: climateops_system_actuate
    alias: "ClimateOps – System Actuate"
    mode: restart
    trace:
      stored_traces: 30
    trigger:
      - platform: state
        entity_id: sensor.cm_system_mode_suggested
      - platform: state
        entity_id:
          - switch.ac_giorno
          - switch.ac_notte
      - platform: time_pattern
        minutes: "/2"
    condition:
      - condition: state
        entity_id: binary_sensor.cm_contract_actuators_defined
        state: "on"
      - condition: state
        entity_id: binary_sensor.cm_contract_actuators_ready
        state: "on"
      - condition: state
        entity_id: sensor.cm_contract_missing_entities
        state: "OK"
    action:
      - variables:
          mode: "{{ states('sensor.cm_system_mode_suggested') }}"
          vmc_cutover_on: "{{ is_state('input_boolean.climateops_cutover_vmc','on') }}"
          policy_reason: >-
            {% set policy = states('sensor.cm_policy_reason') %}
            {% if policy not in ['unknown','unavailable',''] %}
              {{ policy }}
            {% else %}
              {{ states('sensor.climateops_planner_reason') }}
            {% endif %}
          ac_available: >-
            {{
              states('switch.ac_giorno') not in ['unknown','unavailable']
              and states('switch.ac_notte') not in ['unknown','unavailable']
            }}
          ac_policy_ok: "{{ is_state('binary_sensor.policy_allow_ac','on') }}"
          ac_day_should_run: "{{ mode == 'COOL_DAY' and ac_available and ac_policy_ok }}"
          ac_night_should_run: "{{ mode == 'COOL_NIGHT' and ac_available and ac_policy_ok }}"
      - choose:
          - conditions: "{{ mode != 'HEAT' }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.heating_master
      - choose:
          - conditions: "{{ (not (ac_day_should_run | bool)) and is_state('switch.ac_giorno','on') }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.ac_giorno
      - choose:
          - conditions: "{{ (not (ac_night_should_run | bool)) and is_state('switch.ac_notte','on') }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.ac_notte
      - choose:
          - conditions: "{{ mode == 'HEAT' }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.heating_master
          - conditions: "{{ mode == 'IDLE' }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.heating_master
          - conditions: >-
              {{
                (vmc_cutover_on | bool)
                and mode == 'VENT_BOOST'
                and is_state('binary_sensor.cm_policy_allow_vmc_boost','on')
              }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id:
                    - switch.vmc_vel_0
                    - switch.vmc_vel_1
                    - switch.vmc_vel_2
              - delay: "00:00:01"
              - service: switch.turn_on
                target:
                  entity_id: switch.vmc_vel_3
          - conditions: >-
              {{
                (vmc_cutover_on | bool)
                and (
                  mode in ['VENT_BASE', 'IDLE']
                  or (mode == 'VENT_BOOST' and is_state('binary_sensor.cm_policy_allow_vmc_boost','off'))
                )
              }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id:
                    - switch.vmc_vel_3
              - delay: "00:00:01"
              - service: switch.turn_on
                target:
                  entity_id: switch.vmc_vel_1
          - conditions: >-
              {{
                (ac_day_should_run | bool)
                and is_state('switch.ac_giorno','off')
              }}
            sequence:
              - service: script.ac_giorno_apply
          - conditions: >-
              {{
                (ac_night_should_run | bool)
                and is_state('switch.ac_notte','off')
              }}
            sequence:
              - service: script.ac_notte_apply
      - service: input_text.set_value
        target:
          entity_id: input_text.cm_system_status
        data:
          value: >-
            System actuation: {{ mode }} | {{ policy_reason }}

  # Enforce AC writer authority during cutover: if an external writer
  # toggles AC ON outside ClimateOps policy/mode, immediately revert.
  - id: climateops_enforce_ac_writer_authority
    alias: "ClimateOps – Enforce AC Writer Authority"
    mode: queued
    trigger:
      - platform: state
        entity_id:
          - switch.ac_giorno
          - switch.ac_notte
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.climateops_cutover_ac
        state: "on"
      - condition: state
        entity_id: binary_sensor.cm_contract_actuators_defined
        state: "on"
      - condition: state
        entity_id: binary_sensor.cm_contract_actuators_ready
        state: "on"
      - condition: state
        entity_id: sensor.cm_contract_missing_entities
        state: "OK"
    action:
      - variables:
          mode: "{{ states('sensor.cm_system_mode_suggested') }}"
          ac_available: >-
            {{
              states('switch.ac_giorno') not in ['unknown','unavailable']
              and states('switch.ac_notte') not in ['unknown','unavailable']
            }}
          ac_policy_ok: "{{ is_state('binary_sensor.policy_allow_ac','on') }}"
          allow_day: "{{ mode == 'COOL_DAY' and ac_available and ac_policy_ok }}"
          allow_night: "{{ mode == 'COOL_NIGHT' and ac_available and ac_policy_ok }}"
          trg: "{{ trigger.entity_id }}"
      - choose:
          - conditions: "{{ trg == 'switch.ac_giorno' and not (allow_day | bool) }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.ac_giorno
              - service: logbook.log
                data:
                  name: "ClimateOps AC authority"
                  entity_id: automation.climateops_enforce_ac_writer_authority
                  message: >-
                    Revert ON non autorizzato su switch.ac_giorno.
                    mode={{ mode }}, policy_allow_ac={{ ac_policy_ok }}.
          - conditions: "{{ trg == 'switch.ac_notte' and not (allow_night | bool) }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.ac_notte
              - service: logbook.log
                data:
                  name: "ClimateOps AC authority"
                  entity_id: automation.climateops_enforce_ac_writer_authority
                  message: >-
                    Revert ON non autorizzato su switch.ac_notte.
                    mode={{ mode }}, policy_allow_ac={{ ac_policy_ok }}.
