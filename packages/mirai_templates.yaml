          {{ (states('sensor.mirai_status_word_raw') | int(0)) | bitwise_and(2**2) != 0 }}

      - name: "mirai_status_word_bit_03"
        unique_id: mirai_status_word_bit_03
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
