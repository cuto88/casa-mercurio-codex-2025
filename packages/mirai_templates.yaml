input_number:
  mirai_running_power_on_w:
    name: "MIRAI - soglia ON da consumi (W)"
    min: 50
    max: 5000
    step: 10
    unit_of_measurement: W
    mode: box
    initial: 450

template:
  - binary_sensor:
      - name: "CM Modbus MIRAI ready"
        unique_id: cm_modbus_mirai_ready
        icon: mdi:check-network
        state: >
          {{ is_number(states('sensor.mirai_status_word_raw')) or is_number(states('sensor.mirai_l261_compressor_step')) }}

      - name: "mirai_machine_running_by_power"
        unique_id: mirai_machine_running_by_power
        icon: mdi:flash
        availability: >
          {{ is_number(states('sensor.mirai_power_w')) }}
        delay_on:
          minutes: 3
        delay_off:
          minutes: 5
        state: >
          {% set p = states('sensor.mirai_power_w') | float(0) %}
          {% set on_w = states('input_number.mirai_running_power_on_w') | float(450) %}
          {{ p >= on_w }}

      - name: "mirai_status_word_bit_00"
        unique_id: mirai_status_word_bit_00
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_raw') | int(0)) | bitwise_and(2**0) != 0 }}

      - name: "mirai_status_word_bit_01"
        unique_id: mirai_status_word_bit_01
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_raw') | int(0)) | bitwise_and(2**1) != 0 }}

      - name: "mirai_status_word_bit_02"
        unique_id: mirai_status_word_bit_02
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
