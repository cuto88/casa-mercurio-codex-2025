---
template:
  - binary_sensor:
      - name: "CM Contract Actuators Defined"
        unique_id: cm_contract_actuators_defined
        state: "{{ is_state('binary_sensor.contract_actuators_defined','on') }}"
      - name: "CM Contract Actuators Ready"
        unique_id: cm_contract_actuators_ready
        state: "{{ is_state('binary_sensor.contract_actuators_ready','on') }}"
      - name: "CM Contract Surplus OK Defined"
        unique_id: cm_contract_surplus_ok_defined
        state: "{{ is_state('binary_sensor.contract_surplus_ok_defined','on') }}"
      - name: "CM Contract Surplus OK Ready"
        unique_id: cm_contract_surplus_ok_ready
        state: "{{ is_state('binary_sensor.contract_surplus_ok_ready','on') }}"
      - name: "CM Policy Allow VMC Boost"
        unique_id: cm_policy_allow_vmc_boost
        state: "{{ is_state('binary_sensor.policy_allow_vmc_boost','on') }}"
      - name: "CM Policy Forecast Inputs Ready"
        unique_id: cm_policy_forecast_inputs_ready
        state: "{{ is_state('binary_sensor.policy_forecast_inputs_ready','on') }}"
      - name: "CM Contract Forecast Inputs Defined"
        unique_id: cm_contract_forecast_inputs_defined
        state: "{{ is_state('binary_sensor.contract_forecast_inputs_defined','on') }}"
      - name: "CM Contract Forecast Inputs Ready"
        unique_id: cm_contract_forecast_inputs_ready
        state: "{{ is_state('binary_sensor.contract_forecast_inputs_ready','on') }}"
      - name: "CM Policy Allow Shift Load"
        unique_id: cm_policy_allow_shift_load
        state: "{{ is_state('binary_sensor.policy_allow_shift_load','on') }}"
      - name: "CM Policy Prefer Self Consumption"
        unique_id: cm_policy_prefer_self_consumption
        state: "{{ is_state('binary_sensor.policy_prefer_self_consumption','on') }}"
      - name: "CM Policy Grid Expensive Now"
        unique_id: cm_policy_grid_expensive_now
        state: "{{ is_state('binary_sensor.policy_grid_expensive_now','on') }}"
      - name: "CM Contract Tariff Grid Policy Ready"
        unique_id: cm_contract_tariff_grid_policy_ready
        state: "{{ is_state('binary_sensor.contract_tariff_grid_policy_ready','on') }}"
      - name: "CM Contract Hierarchy Mode Ready"
        unique_id: cm_contract_hierarchy_mode_ready
        state: "{{ is_state('binary_sensor.contract_hierarchy_mode_ready','on') }}"
      - name: "CM Noncritical Loads Allowed"
        unique_id: cm_noncritical_loads_allowed
        state: "{{ is_state('binary_sensor.climateops_noncritical_loads_allowed','on') }}"

  - sensor:
      - name: "CM Contract Missing Entities"
        unique_id: cm_contract_missing_entities
        state: "{{ states('sensor.contract_missing_entities') }}"
      - name: "CM Mirai Power W"
        unique_id: cm_mirai_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_grid_power_w') }}"
        availability: "{{ states('sensor.sensor_grid_power_w') not in ['unknown','unavailable'] }}"
      - name: "CM EHW Power W"
        unique_id: cm_ehw_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_pv_power_w') }}"
        availability: "{{ states('sensor.sensor_pv_power_w') not in ['unknown','unavailable'] }}"
      - name: "CM Policy Reason"
        unique_id: cm_policy_reason
        state: "{{ states('sensor.policy_arbiter_reason') }}"
      - name: "CM Contract Actuators Reason"
        unique_id: cm_contract_actuators_reason
        state: "{{ states('sensor.contract_actuators_reason') }}"
      - name: "CM Policy Forecast Reason"
        unique_id: cm_policy_forecast_reason
        state: "{{ states('sensor.policy_forecast_reason') }}"
      - name: "CM Contract Forecast Reason"
        unique_id: cm_contract_forecast_reason
        state: "{{ states('sensor.contract_forecast_reason') }}"
      - name: "CM Policy Forecast PV Next Hour W"
        unique_id: cm_policy_forecast_pv_next_hour_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.policy_forecast_pv_next_hour_w') }}"
      - name: "CM Policy Forecast Temp Next Hour C"
        unique_id: cm_policy_forecast_temp_next_hour_c
        unit_of_measurement: "°C"
        state_class: measurement
        device_class: temperature
        state: "{{ states('sensor.policy_forecast_temp_next_hour_c') }}"
      - name: "CM Policy Tariff Grid Reason"
        unique_id: cm_policy_tariff_grid_reason
        state: "{{ states('sensor.policy_tariff_grid_reason') }}"
      - name: "CM Contract Tariff Grid Reason"
        unique_id: cm_contract_tariff_grid_reason
        state: "{{ states('sensor.contract_tariff_grid_reason') }}"
      - name: "CM Contract Hierarchy Reason"
        unique_id: cm_contract_hierarchy_reason
        state: "{{ states('sensor.contract_hierarchy_reason') }}"
      - name: "CM Policy Grid Price Now"
        unique_id: cm_policy_grid_price_now
        unit_of_measurement: "EUR/kWh"
        state_class: measurement
        state: "{{ states('sensor.policy_grid_price_now') }}"
      - name: "CM Policy Grid Import W"
        unique_id: cm_policy_grid_import_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.policy_grid_import_w') }}"
      - name: "CM System Reason"
        unique_id: cm_system_reason
        state: >-
          {% set h = states('sensor.climateops_hierarchy_reason') %}
          {% if h not in ['unknown','unavailable',''] %}
            {{ h }}
          {% else %}
            {{ states('sensor.climateops_planner_reason') }}
          {% endif %}
      - name: "CM System Mode Suggested"
        unique_id: cm_system_mode_suggested
        state: >-
          {% set h = states('sensor.climateops_hierarchy_mode') %}
          {% if h in ['HEAT','COOL_DAY','COOL_NIGHT','VENT_BOOST','VENT_BASE','IDLE'] %}
            {{ h }}
          {% else %}
            {% set heat = is_state('binary_sensor.heating_should_run', 'on') %}
            {% set cool = is_state('binary_sensor.climateops_request_cool', 'on') %}
            {% set t = states('sensor.vmc_vel_target') | int(-1) %}
            {% if heat %}HEAT
            {% elif cool and now().hour >= 8 and now().hour < 23 %}COOL_DAY
            {% elif cool %}COOL_NIGHT
            {% elif t == 3 %}VENT_BOOST
            {% elif t in [0, 1, 2] %}IDLE
            {% else %}IDLE
            {% endif %}
          {% endif %}
        availability: "{{ true }}"
