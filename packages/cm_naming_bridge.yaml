---
template:
  - binary_sensor:
      - name: "CM Contract Actuators Defined"
        unique_id: cm_contract_actuators_defined
        state: "{{ is_state('binary_sensor.contract_actuators_defined','on') }}"
      - name: "CM Contract Actuators Ready"
        unique_id: cm_contract_actuators_ready
        state: "{{ is_state('binary_sensor.contract_actuators_ready','on') }}"
      - name: "CM Contract Surplus OK Defined"
        unique_id: cm_contract_surplus_ok_defined
        state: "{{ is_state('binary_sensor.contract_surplus_ok_defined','on') }}"
      - name: "CM Contract Surplus OK Ready"
        unique_id: cm_contract_surplus_ok_ready
        state: "{{ is_state('binary_sensor.contract_surplus_ok_ready','on') }}"
      - name: "CM Policy Allow VMC Boost"
        unique_id: cm_policy_allow_vmc_boost
        state: "{{ is_state('binary_sensor.policy_allow_vmc_boost','on') }}"

  - sensor:
      - name: "CM Contract Missing Entities"
        unique_id: cm_contract_missing_entities
        state: "{{ states('sensor.contract_missing_entities') }}"
      - name: "Mirai Power W"
        unique_id: cm_mirai_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_grid_power_w') }}"
        availability: "{{ states('sensor.sensor_grid_power_w') not in ['unknown','unavailable'] }}"
      - name: "EHW Power W"
        unique_id: cm_ehw_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_pv_power_w') }}"
        availability: "{{ states('sensor.sensor_pv_power_w') not in ['unknown','unavailable'] }}"
      - name: "CM Policy Reason"
        unique_id: cm_policy_reason
        state: "{{ states('sensor.policy_arbiter_reason') }}"
      - name: "CM Contract Actuators Reason"
        unique_id: cm_contract_actuators_reason
        state: "{{ states('sensor.contract_actuators_reason') }}"
      - name: "CM System Mode Suggested"
        unique_id: cm_system_mode_suggested
        state: >-
          {% set heat = is_state('binary_sensor.heating_should_run', 'on') %}
          {% set cool = is_state('binary_sensor.climateops_request_cool', 'on') %}
          {% set t = states('sensor.vmc_vel_target') | int(-1) %}
          {% if heat %}HEAT
          {% elif cool and now().hour >= 8 and now().hour < 23 %}COOL_DAY
          {% elif cool %}COOL_NIGHT
          {% elif t == 3 %}VENT_BOOST
          {% elif t in [0, 1, 2] %}IDLE
          {% else %}IDLE
          {% endif %}
        availability: "{{ true }}"
