---
# Contract layer: evidenzia dipendenze mancanti per clima/VMC.

template:
  - binary_sensor:
      - name: "Contract meteo stub active"
        unique_id: contract_meteo_stub_active
        state: >-
          {%- set meteo_sensors = [
            'binary_sensor.meteo_pioggia',
            'sensor.meteo_vento_velocita'
          ] -%}
          {%- set meteo_states = meteo_sensors | map('states') | list -%}
          {%- set sensors_ready = meteo_states | reject('in', ['unknown','unavailable','']) | list | count == meteo_sensors | length -%}
          {{ not sensors_ready }}

      - name: "Contract surplus ok defined"
        unique_id: contract_surplus_ok_defined
        state: >-
          # PV surplus is optional input; policy_surplus_ok provides fail-safe abstraction
          {{ true }}

      - name: "Contract surplus ok ready"
        unique_id: contract_surplus_ok_ready
        state: >-
          {{ has_value('binary_sensor.surplus_ok') }}
      - name: "Contract surplus policy ok"
        unique_id: contract_surplus_policy_ok
        state: >-
          {{ states('binary_sensor.policy_surplus_ok') not in ['unknown','unavailable',''] }}
      - name: "Contract forecast inputs defined"
        unique_id: contract_forecast_inputs_defined
        state: >-
          # Forecast feed is optional; policy layer handles fallback when not available
          {{ true }}
      - name: "Contract forecast inputs ready"
        unique_id: contract_forecast_inputs_ready
        state: >-
          {{ is_state('binary_sensor.policy_forecast_inputs_ready','on') }}
      - name: "Contract tariff grid policy ready"
        unique_id: contract_tariff_grid_policy_ready
        state: >-
          {{
            states('binary_sensor.policy_allow_shift_load') not in ['unknown','unavailable','']
            and states('sensor.policy_tariff_grid_reason') not in ['unknown','unavailable','']
          }}
      - name: "Contract hierarchy mode ready"
        unique_id: contract_hierarchy_mode_ready
        state: >-
          {{
            states('sensor.climateops_hierarchy_mode') not in ['unknown','unavailable','']
            and states('sensor.climateops_hierarchy_reason') not in ['unknown','unavailable','']
          }}

      - name: "Contract core fallback ok"
        unique_id: contract_core_fallback_ok
        state: >-
          {{
            states('input_number.core_backup_t_in') not in ['unknown','unavailable','']
            and states('input_number.core_backup_ur_in') not in ['unknown','unavailable','']
            and states('sensor.core_backup_last_update') not in ['unknown','unavailable','']
          }}

      - name: "Contract policy arbiter ok"
        unique_id: contract_policy_arbiter_ok
        state: >-
          {{
            states('binary_sensor.policy_allow_ac') not in ['unknown','unavailable','']
            and states('binary_sensor.policy_allow_vmc_boost') not in ['unknown','unavailable','']
          }}
      - name: "Contract actuators defined"
        unique_id: contract_actuators_defined
        state: >-
          {%- set required_actuators = [
            'switch.heating_master',
            'switch.vmc_vel_0',
            'switch.vmc_vel_1',
            'switch.vmc_vel_2',
            'switch.vmc_vel_3'
          ] -%}
          {%- set required_states = required_actuators | map('states') | list -%}
          {{ required_states | reject('eq', 'unknown') | list | count == required_actuators | length }}
        icon: mdi:check-circle

      - name: "Contract actuators ready"
        unique_id: contract_actuators_ready
        state: >-
          {%- set required_actuators = [
            'switch.heating_master',
            'switch.vmc_vel_0',
            'switch.vmc_vel_1',
            'switch.vmc_vel_2',
            'switch.vmc_vel_3'
          ] -%}
          {%- set optional_ac_actuators = [
            'switch.ac_giorno',
            'switch.ac_notte'
          ] -%}
          {%- set required_states = required_actuators | map('states') | list -%}
          {%- set optional_ac_states = optional_ac_actuators | map('states') | list -%}
          {{
            required_states | reject('eq', 'unavailable') | list | count == required_actuators | length
            and (
              optional_ac_states | reject('eq', 'unavailable') | list | count == optional_ac_actuators | length
              or optional_ac_states | select('eq', 'unknown') | list | count == optional_ac_actuators | length
            )
          }}
      - name: "Contract actuators reason"
        unique_id: contract_actuators_reason
        state: >-
          {%- set required_actuators = [
            'switch.heating_master',
            'switch.vmc_vel_0',
            'switch.vmc_vel_1',
            'switch.vmc_vel_2',
            'switch.vmc_vel_3'
          ] -%}
          {%- set optional_ac_actuators = [
            'switch.ac_giorno',
            'switch.ac_notte'
          ] -%}
          {%- set req_missing = namespace(v=[]) -%}
          {%- set req_unavail = namespace(v=[]) -%}
          {%- for entity in required_actuators -%}
            {%- set st = states(entity) -%}
            {%- if st == 'unknown' -%}
              {%- set req_missing.v = req_missing.v + [entity] -%}
            {%- elif st == 'unavailable' -%}
              {%- set req_unavail.v = req_unavail.v + [entity] -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set ac_unknown = namespace(v=[]) -%}
          {%- set ac_unavail = namespace(v=[]) -%}
          {%- for entity in optional_ac_actuators -%}
            {%- set st = states(entity) -%}
            {%- if st == 'unknown' -%}
              {%- set ac_unknown.v = ac_unknown.v + [entity] -%}
            {%- elif st == 'unavailable' -%}
              {%- set ac_unavail.v = ac_unavail.v + [entity] -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if req_missing.v | length > 0 -%}
            MISSING_REQUIRED: {{ req_missing.v | join(', ') }}
          {%- elif req_unavail.v | length > 0 -%}
            UNAVAILABLE_REQUIRED: {{ req_unavail.v | join(', ') }}
          {%- elif ac_unavail.v | length > 0 and ac_unknown.v | length < optional_ac_actuators | length -%}
            UNAVAILABLE_OPTIONAL_AC: {{ ac_unavail.v | join(', ') }}
          {%- else -%}
            OK
          {%- endif -%}

  - sensor:
      - name: "Contract missing entities"
        unique_id: contract_missing_entities
        state: >-
          {%- set required = [
            'switch.heating_master',
            'switch.vmc_vel_0',
            'switch.vmc_vel_1',
            'switch.vmc_vel_2',
            'switch.vmc_vel_3'
          ] -%}
          {%- set ns = namespace(missing=[]) -%}
          {%- for entity in required -%}
            {%- if states(entity) == 'unknown' -%}
              {%- set ns.missing = ns.missing + [entity] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.missing | join(', ') if ns.missing | length > 0 else 'OK' }}
      - name: "Contract forecast reason"
        unique_id: contract_forecast_reason
        state: >-
          {% if is_state('binary_sensor.policy_forecast_inputs_ready','on') %}
            OK_{{ states('sensor.policy_forecast_reason') }}
          {% else %}
            NOT_READY_{{ states('sensor.policy_forecast_reason') }}
          {% endif %}
      - name: "Contract tariff grid reason"
        unique_id: contract_tariff_grid_reason
        state: >-
          {% if is_state('binary_sensor.contract_tariff_grid_policy_ready','on') %}
            OK_{{ states('sensor.policy_tariff_grid_reason') }}
          {% else %}
            NOT_READY_{{ states('sensor.policy_tariff_grid_reason') }}
          {% endif %}
      - name: "Contract hierarchy reason"
        unique_id: contract_hierarchy_reason
        state: >-
          {% if is_state('binary_sensor.contract_hierarchy_mode_ready','on') %}
            OK_{{ states('sensor.climateops_hierarchy_reason') }}
          {% else %}
            NOT_READY_{{ states('sensor.climateops_hierarchy_reason') }}
          {% endif %}
