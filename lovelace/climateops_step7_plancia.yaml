title: "ClimateOps Step7"
views:
  - title: "Executive"
    path: executive
    icon: mdi:view-dashboard
    type: sections
    max_columns: 1

    sections:
      - type: grid
        title: "Executive status"
        cards:
          - type: markdown
            content: >
              ## ClimateOps Executive
              Stato operativo sintetico per decisione rapida.
          - type: entities
            title: "GO/NO-GO runtime"
            show_header_toggle: false
            entities:
              - entity: sensor.cm_system_mode_suggested
                name: System mode suggested
              - entity: sensor.cm_system_reason
                name: System reason
              - entity: binary_sensor.aeb_kpi_inputs_ready
                name: AEB KPI inputs ready
              - entity: sensor.aeb_kpi_reason
                name: AEB KPI reason

      - type: grid
        title: "Comfort & Planner (today)"
        cards:
          - type: entities
            title: "KPI + recommendations"
            show_header_toggle: false
            entities:
              - entity: sensor.climateops_kpi_comfort_band_percent_today
                name: Comfort band % (today)
              - entity: sensor.climateops_kpi_heating_cycles_today
                name: Heating cycles (today)
              - entity: sensor.climateops_kpi_ac_cycles_today
                name: AC cycles (today)
              - entity: sensor.climateops_kpi_vmc_boost_minutes_today
                name: VMC boost minutes (today)
              - entity: sensor.planner_heat_setpoint_reco
                name: Heat setpoint reco
              - entity: sensor.planner_cool_setpoint_reco
                name: Cool setpoint reco
              - entity: sensor.planner_dhw_run_reco
                name: DHW run reco
              - entity: sensor.planner_notes
                name: Planner notes

      - type: grid
        title: "Energy policy"
        cards:
          - type: entities
            title: "Forecast + tariff/grid"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.policy_forecast_inputs_ready
                name: Forecast inputs ready
              - entity: sensor.policy_forecast_reason
                name: Forecast reason
              - entity: sensor.policy_grid_price_now
                name: Grid price now
              - entity: sensor.policy_grid_import_w
                name: Grid import W
              - entity: binary_sensor.policy_allow_shift_load
                name: Allow shift load
              - entity: sensor.policy_tariff_grid_reason
                name: Tariff/grid reason

      - type: grid
        title: "Quick trend"
        cards:
          - type: history-graph
            title: "24h key trend"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy %
              - entity: sensor.policy_grid_import_w
                name: Grid import W

  - title: "Diagnostics"
    path: diagnostics
    icon: mdi:stethoscope
    type: sections
    max_columns: 1

    sections:
      - type: grid
        title: "Runtime health"
        cards:
          - type: entities
            title: "Contracts & readiness"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.policy_forecast_inputs_ready
                name: Forecast inputs ready
              - entity: binary_sensor.contract_forecast_inputs_ready
                name: Contract forecast ready
              - entity: binary_sensor.contract_hierarchy_mode_ready
                name: Hierarchy contract ready
              - entity: binary_sensor.contract_tariff_grid_policy_ready
                name: Tariff/grid contract ready
              - entity: binary_sensor.aeb_kpi_inputs_ready
                name: AEB KPI inputs ready

      - type: grid
        title: "Reason chain"
        cards:
          - type: entities
            title: "Decision diagnostics"
            show_header_toggle: false
            entities:
              - entity: sensor.cm_system_reason
                name: System reason
              - entity: sensor.planner_notes
                name: Planner notes
              - entity: sensor.policy_forecast_reason
                name: Forecast reason
              - entity: sensor.policy_tariff_grid_reason
                name: Tariff/grid reason
              - entity: sensor.heating_reason
                name: Heating reason
              - entity: sensor.ventilation_reason
                name: Ventilation reason

      - type: grid
        title: "AEB diagnostics"
        cards:
          - type: entities
            title: "KPI + policy status"
            show_header_toggle: false
            entities:
              - entity: sensor.aeb_kpi_reason
                name: AEB KPI reason
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_shift_effectiveness_pct
                name: Shift effectiveness %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy %
              - entity: sensor.aeb_policy_activation_rate_pct
                name: Policy activation %

      - type: grid
        title: "Health trend"
        cards:
          - type: history-graph
            title: "24h diagnostics trend"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.policy_grid_import_w
                name: Grid import W
              - entity: sensor.policy_grid_price_now
                name: Grid price
              - entity: sensor.climateops_kpi_comfort_band_percent_today
                name: Comfort band %
              - entity: sensor.climateops_kpi_vmc_boost_minutes_today
                name: VMC boost min

  - title: "Step7 Ops"
    path: step7
    icon: mdi:transmission-tower
    type: sections
    max_columns: 2

    sections:
      - type: grid
        title: "Stato generale"
        cards:
          - type: entities
            title: "Runtime status"
            show_header_toggle: false
            entities:
              - entity: sensor.cm_system_mode_suggested
                name: System mode suggested
              - entity: sensor.cm_system_reason
                name: System reason
              - entity: binary_sensor.contract_hierarchy_mode_ready
                name: Hierarchy contract ready
              - entity: sensor.contract_hierarchy_reason
                name: Hierarchy contract reason

      - type: grid
        title: "Forecast contracts"
        cards:
          - type: entities
            title: "Forecast"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.policy_forecast_inputs_ready
                name: Forecast inputs ready
              - entity: sensor.policy_forecast_reason
                name: Forecast reason
              - entity: sensor.policy_forecast_pv_next_hour_w
                name: PV next hour W
              - entity: sensor.policy_forecast_temp_next_hour_c
                name: Temp next hour C
              - entity: binary_sensor.contract_forecast_inputs_ready
                name: Contract forecast ready
              - entity: sensor.contract_forecast_reason
                name: Contract forecast reason

      - type: grid
        title: "Tariff/Grid policy"
        cards:
          - type: entities
            title: "Policy controls"
            show_header_toggle: false
            entities:
              - entity: input_boolean.policy_enable_tariff_grid
                name: Enable tariff/grid
              - entity: binary_sensor.policy_allow_shift_load
                name: Allow shift load
              - entity: sensor.policy_tariff_grid_reason
                name: Tariff/grid reason
              - entity: sensor.policy_grid_price_now
                name: Grid price now
              - entity: binary_sensor.policy_grid_expensive_now
                name: Grid expensive now
              - entity: binary_sensor.policy_grid_cheap_now
                name: Grid cheap now
              - entity: sensor.policy_grid_import_w
                name: Grid import W
              - entity: binary_sensor.contract_tariff_grid_policy_ready
                name: Contract tariff/grid ready
              - entity: sensor.contract_tariff_grid_reason
                name: Contract tariff/grid reason

      - type: grid
        title: "Hierarchy layer"
        cards:
          - type: entities
            title: "Multi-load hierarchy"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.climateops_noncritical_loads_allowed
                name: Noncritical loads allowed
              - entity: sensor.climateops_hierarchy_mode
                name: Hierarchy mode
              - entity: sensor.climateops_hierarchy_reason
                name: Hierarchy reason
              - entity: binary_sensor.cm_contract_hierarchy_mode_ready
                name: CM hierarchy ready
              - entity: sensor.cm_contract_hierarchy_reason
                name: CM hierarchy reason

      - type: grid
        title: "KPI AEB"
        cards:
          - type: entities
            title: "KPI snapshot"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.aeb_kpi_inputs_ready
                name: KPI inputs ready
              - entity: sensor.aeb_kpi_reason
                name: KPI reason
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_shift_effectiveness_pct
                name: Shift effectiveness %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy score %
              - entity: sensor.aeb_policy_activation_rate_pct
                name: Policy activation %

      - type: grid
        title: "Trend 24h"
        cards:
          - type: history-graph
            title: "Policy/KPI trend (24h)"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.policy_grid_price_now
                name: Grid price
              - entity: sensor.policy_grid_import_w
                name: Grid import W
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy %

      - type: grid
        title: "Phase1 DRY-RUN"
        cards:
          - type: entities
            title: "KPI + Planner (recommendation only)"
            show_header_toggle: false
            entities:
              - entity: sensor.climateops_kpi_comfort_band_percent_today
                name: Comfort band % (today)
              - entity: sensor.climateops_kpi_heating_cycles_today
                name: Heating cycles (today)
              - entity: sensor.climateops_kpi_ac_cycles_today
                name: AC cycles (today)
              - entity: sensor.climateops_kpi_vmc_boost_minutes_today
                name: VMC boost minutes (today)
              - entity: sensor.planner_heat_setpoint_reco
                name: Planner heat setpoint reco
              - entity: sensor.planner_cool_setpoint_reco
                name: Planner cool setpoint reco
              - entity: sensor.planner_dhw_run_reco
                name: Planner DHW run reco
              - entity: sensor.planner_notes
                name: Planner notes
