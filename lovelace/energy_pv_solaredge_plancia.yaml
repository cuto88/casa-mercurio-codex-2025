views:
  - title: "PV SolarEdge"
    path: pv_solaredge
    icon: mdi:solar-power
    type: sections
    max_columns: 3

    sections:

      #######################################################################
      # 1) STATO ATTUALE
      #######################################################################
      - type: grid
        title: "Stato attuale"
        cards:
          - type: gauge
            name: Potenza FV istantanea
            entity: sensor.pv_power_now
            min: 0
            max: 7000
            needle: true
          - type: entities
            title: "Stato"
            show_header_toggle: false
            entities:
              - entity: sensor.pv_power_now
                name: PV Potenza W
              - entity: sensor.pv_potenza_sorgente
                name: Sorgente potenza
              - entity: sensor.pv_energy_total
                name: Energia totale kWh

      #######################################################################
      # 2) ENERGIA
      #######################################################################
      - type: grid
        title: "Energia"
        cards:
          - type: entities
            title: "Produzione"
            show_header_toggle: false
            entities:
              - entity: sensor.pv_energy_daily
                name: Oggi
              - entity: sensor.pv_energy_monthly
                name: Questo mese
              - entity: sensor.pv_energy_yearly
                name: Questo anno
          - type: statistics-graph
            title: "Produzione giornaliera (7 giorni)"
            chart_type: bar
            period: day
            stat_types:
              - change
            days_to_show: 7
            entities:
              - entity: sensor.pv_energy_total
                name: kWh/giorno

      - type: grid
        title: "Trend 24h"
        cards:
          - type: history-graph
            title: "Potenza FV (24h)"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.pv_power_now
                name: PV W

      #######################################################################
      # 3) DEBUG (OPZIONALE)
      #######################################################################
      - type: grid
        title: "Debug sensori"
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.pv_potenza_sorgente
                name: Sorgente selezionata
              - entity: sensor.solaredge_potenza_attuale
                name: SolarEdge Potenza RAW
              - entity: sensor.solaredge_energia_dall_installazione
                name: SolarEdge Energia RAW
              - entity: sensor.sensor_pv_power_w
                name: LocalTuya Potenza RAW (fallback)
              - entity: sensor.pv_power_now
                name: PV Potenza canonico
              - entity: sensor.pv_energy_total
                name: PV Energia Totale
